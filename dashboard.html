<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoCDP Matrix — Command Dashboard</title>
<meta name="description" content="The AutoCDP four-tier Matrix command dashboard for owners, agencies, dealers, and staff."/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
body{overflow-x:hidden}
.app{display:grid;grid-template-columns:288px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:24px;background:color-mix(in srgb,var(--surface) 92%,transparent);border-right:1px solid var(--border);backdrop-filter:blur(18px)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.brand .mark{width:42px;height:42px;border-radius:13px;background:linear-gradient(145deg,var(--primary),var(--primary-2));display:grid;place-items:center;box-shadow:var(--shadow-sm)}
.brand .mark svg{width:22px;height:22px;color:var(--inverse)}
.brand strong{font-family:'Manrope',sans-serif;font-size:1.1rem;display:block}
.brand span{font-size:.72rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.tier-badge{padding:10px 14px;border-radius:14px;background:var(--highlight);color:var(--primary);font-size:.82rem;font-weight:700;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
.nav-label{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:18px 0 10px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:13px;color:var(--muted);font-size:.9rem;font-weight:600;margin-bottom:5px;transition:.18s ease}
.nav-item:hover,.nav-item.active{background:var(--surface-2);color:var(--text);transform:translateX(2px)}
.nav-item .mini{font-size:.7rem;padding:3px 8px;border-radius:999px;background:var(--highlight);color:var(--primary)}
.sb-foot{margin-top:auto;padding-top:18px;border-top:1px solid var(--divider)}
.sb-user{display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;background:var(--surface-2)}
.sb-user .av{width:40px;height:40px;border-radius:11px;background:linear-gradient(145deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#1a140b;font-weight:800}
.sb-user .nm{font-size:.86rem;font-weight:700}
.sb-user .rl{font-size:.74rem;color:var(--muted)}
.logout{margin-top:10px;width:100%;text-align:center;padding:11px;border-radius:12px;background:var(--surface-2);border:1px solid var(--border);font-size:.84rem;font-weight:600;color:var(--muted)}
.main{min-width:0}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 28px;border-bottom:1px solid var(--border);background:color-mix(in srgb,var(--bg) 84%,transparent);backdrop-filter:blur(18px)}
.topbar h1{font-family:'Manrope',sans-serif;font-size:1.35rem;margin-bottom:3px}
.topbar p{font-size:.86rem;color:var(--muted)}
.top-actions{display:flex;align-items:center;gap:12px}
.search{display:flex;align-items:center;gap:10px;padding:11px 15px;border:1px solid var(--border);border-radius:14px;background:var(--surface);min-width:280px}
.search input{border:none;background:transparent;outline:none;color:var(--text);width:100%;font-size:.9rem}
.icon-btn{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:var(--surface);border:1px solid var(--border)}
.menu-btn{display:none}
.content{padding:26px;max-width:1560px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:22px;box-shadow:var(--shadow-sm)}
.kpi .lbl{font-size:.84rem;color:var(--muted);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.kpi .val{font-family:'Manrope',sans-serif;font-size:clamp(1.7rem,1.3rem+1vw,2.5rem);font-weight:800;line-height:1}
.kpi .foot{margin-top:12px;font-size:.76rem;color:var(--faint)}
.grid{display:grid;gap:18px;margin-bottom:20px}
.g-2{grid-template-columns:1.35fr .65fr}
.g-3{grid-template-columns:repeat(3,1fr)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:24px;box-shadow:var(--shadow-sm)}
.panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px}
.panel-head h3{font-size:1.12rem;margin-bottom:4px}
.panel-head p{font-size:.86rem;color:var(--muted);max-width:42ch}
.chart{height:200px;display:flex;align-items:flex-end;gap:12px;padding:14px 4px 0}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px}
.bar{width:100%;max-width:44px;border-radius:12px 12px 5px 5px;background:linear-gradient(180deg,var(--primary),var(--primary-2));box-shadow:0 12px 24px color-mix(in srgb,var(--primary) 30%,transparent)}
.bar.alt{background:linear-gradient(180deg,var(--accent),var(--accent-2))}
.bw span{font-size:.72rem;color:var(--faint)}
.row{display:grid;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--divider)}
.row:last-child{border-bottom:none}
.r4{grid-template-columns:1.4fr .8fr .7fr .6fr}
.row strong{display:block;font-size:.9rem}
.row .sub{display:block;font-size:.78rem;color:var(--muted)}
.row .lbl{font-size:.74rem;color:var(--faint);display:block;margin-bottom:3px}
.row .num{font-size:.95rem;font-weight:700}
.stages{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stage{padding:16px;border-radius:16px;background:var(--surface-2);border:1px solid var(--border)}
.stage.hot{background:linear-gradient(180deg,var(--highlight),transparent);border-color:color-mix(in srgb,var(--primary) 35%,transparent)}
.stage em{font-style:normal;font-size:.72rem;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:8px}
.stage b{font-family:'Manrope',sans-serif;font-size:1.5rem;display:block;margin-bottom:4px}
.stage span{font-size:.76rem;color:var(--muted)}
.agent-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--divider)}
.agent-row:last-child{border-bottom:none}
.dot{width:9px;height:9px;border-radius:50%;background:var(--success);box-shadow:0 0 0 4px color-mix(in srgb,var(--success) 22%,transparent)}
.agent-row .nm{font-size:.9rem;font-weight:600;flex:1}
.agent-row .tier{font-size:.7rem;padding:4px 9px;border-radius:999px;background:var(--highlight);color:var(--primary);font-weight:700}
.queue-item{display:flex;align-items:center;gap:14px;padding:14px;border-radius:14px;background:var(--surface-2);border:1px solid var(--border);margin-bottom:10px}
.queue-item .av{width:42px;height:42px;border-radius:12px;background:var(--highlight);display:grid;place-items:center;font-weight:800;color:var(--primary)}
.queue-item .info{flex:1}
.queue-item .info strong{font-size:.92rem;display:block}
.queue-item .info span{font-size:.78rem;color:var(--muted)}
.queue-item button{padding:9px 14px;border-radius:11px;background:var(--primary);color:var(--inverse);font-size:.8rem;font-weight:700}
.hidden{display:none!important}
.mobile-dock{display:none}
@media(max-width:980px){
 .app{grid-template-columns:1fr}
 .sidebar{position:fixed;inset:0 auto 0 0;width:min(86vw,320px);transform:translateX(-103%);z-index:60;transition:.25s ease}
 .sidebar.open{transform:translateX(0)}
 .menu-btn{display:grid}
 .search{display:none}
 .kpis{grid-template-columns:1fr 1fr}
 .g-2,.g-3,.stages{grid-template-columns:1fr}
 .content{padding:18px 16px 96px}
 .topbar{padding:14px 16px}
 .row.r4{grid-template-columns:1fr;gap:5px}
 .mobile-dock{position:fixed;left:12px;right:12px;bottom:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;background:color-mix(in srgb,var(--surface) 95%,transparent);border:1px solid var(--border);border-radius:18px;backdrop-filter:blur(16px);z-index:50;box-shadow:var(--shadow-md)}
 .dock-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px;border-radius:12px;font-size:10px;color:var(--muted);font-weight:600}
 .dock-item.active{background:var(--surface-2);color:var(--text)}
 .dock-item svg{width:20px;height:20px}
}
@media(max-width:560px){.kpis{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
 <aside class="sidebar" id="sidebar">
  <div class="brand">
   <span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15.5 12 4l8 11.5"/><path d="M7.5 15.5h9"/><path d="M9.5 19h5"/></svg></span>
   <div><strong>AutoCDP Matrix</strong><span>Command Layer</span></div>
  </div>
  <div class="tier-badge"><span id="tierLabel">Owner · Network</span><span class="tag tag-live">Live</span></div>
  <nav id="nav"></nav>
  <div class="sb-foot">
   <div class="sb-user"><div class="av" id="avInit">OW</div><div><div class="nm" id="userName">Network Owner</div><div class="rl" id="userRole">Owner access</div></div></div>
   <a class="logout" href="index.html">Sign out</a>
  </div>
 </aside>

 <main class="main">
  <header class="topbar">
   <div>
    <button class="icon-btn menu-btn" data-menu aria-label="Menu" style="float:left;margin-right:12px">☰</button>
    <h1 id="pageTitle">Executive Overview</h1>
    <p id="pageSub">Network-wide performance across every rooftop and agency.</p>
   </div>
   <div class="top-actions">
    <label class="search" aria-label="Search"><span>⌕</span><input type="text" placeholder="Search customers, segments, campaigns"/></label>
    <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">◐</button>
   </div>
  </header>
  <div class="content" id="content"></div>
 </main>
</div>

<nav class="mobile-dock" id="dock"></nav>

<script>
(()=>{
 const root=document.documentElement;
 const tgl=document.querySelector('[data-theme-toggle]');
 const prefersDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
 let theme=root.getAttribute('data-theme')||(prefersDark?'dark':'light');
 root.setAttribute('data-theme',theme);
 tgl?.addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';root.setAttribute('data-theme',theme);});
 const sidebar=document.getElementById('sidebar');
 document.querySelector('[data-menu]')?.addEventListener('click',()=>sidebar.classList.toggle('open'));

 const role=(location.hash.replace('#','')||'owner');
 const TIERS={
  owner:{label:'Owner · Network',name:'Network Owner',short:'Owner access',init:'OW',title:'Executive Overview',sub:'Network-wide performance across every rooftop and agency.'},
  agency:{label:'Agency · Portfolio',name:'Agency Lead',short:'Multi-rooftop access',init:'AG',title:'Portfolio Command',sub:'Manage every client rooftop from one orchestration layer.'},
  dealer:{label:'Dealer · Rooftop',name:'Dealer Principal',short:'Single rooftop access',init:'DL',title:'Rooftop Command',sub:'Sales, service, trade, and loyalty motions for your store.'},
  staff:{label:'Staff · BDC',name:'BDC Specialist',short:'Staff access',init:'ST',title:'My Task Queue',sub:"Today's highest-leverage customer touches, ranked for you."}
 };
 const t=TIERS[role]||TIERS.owner;
 document.getElementById('tierLabel').textContent=t.label;
 document.getElementById('userName').textContent=t.name;
 document.getElementById('userRole').textContent=t.short;
 document.getElementById('avInit').textContent=t.init;
 document.getElementById('pageTitle').textContent=t.title;
 document.getElementById('pageSub').textContent=t.sub;

 const NAVS={
  owner:[['Command',[['Executive overview','Live'],['Network rooftops','142'],['Agency partners','18']]],['Intelligence',[['Learning Ledger',''],['Signals engine','24'],['Revenue motions','']]]],
  agency:[['Command',[['Portfolio overview','Live'],['Client rooftops','26'],['Rollup attribution','']]],['Operations',[['Campaign queue','12'],['Signals engine','18'],['Data health','99%']]]],
  dealer:[['Command',[['Rooftop overview','Live'],['Signals engine','12'],['Audience studio','']]],['Execution',[['Campaign attribution',''],['Service retention','94'],['Data health','99%']]]],
  staff:[['My work',[['Task queue','38'],['My customers',''],['Today closed','7']]],['Reference',[['Customer timelines',''],['Compliance notes','']]]]
 };
 const navEl=document.getElementById('nav');
 (NAVS[role]||NAVS.owner).forEach(g=>{
  const lbl=document.createElement('div');lbl.className='nav-label';lbl.textContent=g[0];navEl.appendChild(lbl);
  g[1].forEach((it,i)=>{
   const a=document.createElement('a');a.className='nav-item'+(i===0&&g===NAVS[role][0]?' active':'');a.href='#'+role;
   a.innerHTML='<span>'+it[0]+'</span>'+(it[1]?'<span class="mini">'+it[1]+'</span>':'<span>›</span>');
   navEl.appendChild(a);
  });
 });

 const DOCK={
  owner:[['Overview','M3 21h18M5 21V8l7-5 7 5v13'],['Rooftops','M3 13l2-5h14l2 5M5 13h14v5H5z'],['Ledger','M12 2v20M2 12h20'],['Revenue','M4 18l5-5 4 4 7-9']],
  agency:[['Portfolio','M3 4h7v7H3zM14 4h7v7h-7z'],['Clients','M3 13l2-5h14l2 5'],['Queue','M4 6h16M4 12h16M4 18h10'],['Rollup','M4 18l5-5 4 4 7-9']],
  dealer:[['Overview','M3 21h18M5 21V8l7-5 7 5v13'],['Signals','M12 2v20M2 12h20'],['Audience','M12 2a4 4 0 100 8 4 4 0 000-8'],['Revenue','M4 18l5-5 4 4 7-9']],
  staff:[['Queue','M4 6h16M4 12h16M4 18h10'],['Customers','M12 2a4 4 0 100 8 4 4 0 000-8'],['Closed','M5 12l4 4 10-10'],['Notes','M5 4h14v16H5z']]
 };
 const dock=document.getElementById('dock');
 (DOCK[role]||DOCK.owner).forEach((d,i)=>{
  const a=document.createElement('a');a.className='dock-item'+(i===0?' active':'');a.href='#'+role;
  a.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="'+d[1]+'"/></svg><span>'+d[0]+'</span>';
  dock.appendChild(a);
 });

 // ---- Content blocks per tier ----
 const kpi=(l,v,f,tag)=>`<article class="kpi"><div class="lbl">${l}${tag?'<span class="tag '+tag[1]+'">'+tag[0]+'</span>':''}</div><div class="val">${v}</div><div class="foot">${f}</div></article>`;
 const chart=(vals)=>{const days=['Mon','Tue','Wed','Thu','Fri','Sat'];return '<div class="chart">'+vals.map((h,i)=>`<div class="bw"><div class="bar${i%2?' alt':''}" style="height:${h}%"></div><span>${days[i]}</span></div>`).join('')+'</div>';};

 const agentsPanel=`<aside class="panel"><div class="panel-head"><div><h3>Agent swarm</h3><p>Six specialists on one shared state.</p></div><span class="tag tag-live">All active</span></div>
  ${[['Orchestrator','Opus 4.8'],['Data Intelligence','Sonnet 4.6'],['Audience Targeting','Sonnet 4.6'],['Creative Generation','Sonnet 4.6'],['Compliance Review','Haiku 4.5'],['Learning & Optimization','Sonnet 4.6']].map(a=>`<div class="agent-row"><span class="dot"></span><span class="nm">${a[0]}</span><span class="tier">${a[1]}</span></div>`).join('')}</aside>`;

 const signalStages=`<div class="stages"><div class="stage hot"><em>Service lapsed</em><b>5,842</b><span>≥90 days since RO</span></div><div class="stage"><em>Trade equity</em><b>1,240</b><span>Positive equity owners</span></div><div class="stage"><em>Lease maturity</em><b>3,119</b><span>Inside 120-day band</span></div><div class="stage"><em>Loyalty upgrade</em><b>818</b><span>Ready for upgrade msg</span></div></div>`;

 const VIEWS={
  owner:`
   <section class="kpis">
    ${kpi('Network revenue in motion','$48.2M','Across 142 rooftops',['Live','tag-live'])}
    ${kpi('Lapsed customers re-engaged','312,840','Last 30 days',['+18%','tag-ok'])}
    ${kpi('Avg attributed ROAS','11.4x','Per-piece QR + CRM',['Premium','tag-ok'])}
    ${kpi('Campaigns executed','24,118','Fully autonomous',['24/7','tag-live'])}
   </section>
   <section class="grid g-2">
    <div class="panel"><div class="panel-head"><div><h3>Network execution volume</h3><p>Attributed campaign sends across all rooftops this week.</p></div><span class="pill">All channels</span></div>${chart([72,48,84,64,92,58])}</div>
    ${agentsPanel}
   </section>
   <section class="grid g-2">
    <div class="panel"><div class="panel-head"><div><h3>Top rooftops by recovered revenue</h3><p>Sorted by attributed appointments and closed deals.</p></div><span class="pill">Rollup</span></div>
     ${[['Summit Auto Group','Region · West','$3.8M','tag-ok','Top'],['Coastline Motors','Region · South','$2.9M','tag-ok','Up'],['Riverbend Automotive','Region · Central','$2.1M','tag-live','Stable'],['Northgate Dealers','Region · East','$1.7M','tag-warn','Watch']].map(r=>`<div class="row r4"><div><strong>${r[0]}</strong><span class="sub">${r[1]}</span></div><div><span class="lbl">Recovered</span><span class="num">${r[2]}</span></div><div><span class="lbl">Trend</span><span class="num">${r[4]}</span></div><div><span class="tag ${r[3]}">${r[4]}</span></div></div>`).join('')}
    </div>
    <aside class="panel"><div class="panel-head"><div><h3>Learning Ledger</h3><p>Promote / retire decisions feeding the network.</p></div><span class="tag tag-ok">+42 anchors</span></div>
     ${[['"We miss you" angle','Promoted','tag-ok'],['Service-due reminder','Promoted','tag-ok'],['Generic discount','Retired','tag-hot'],['Trade-up nudge','Testing','tag-warn']].map(r=>`<div class="row" style="grid-template-columns:1fr auto"><strong>${r[0]}</strong><span class="tag ${r[2]}">${r[1]}</span></div>`).join('')}
    </aside>
   </section>`,
  agency:`
   <section class="kpis">
    ${kpi('Client rooftops','26','Active portfolio',['Live','tag-live'])}
    ${kpi('Portfolio revenue in motion','$9.4M','Last 30 days',['+12%','tag-ok'])}
    ${kpi('Avg client ROAS','9.8x','Across accounts',['Strong','tag-ok'])}
    ${kpi('Campaigns queued','312','Awaiting send windows',['Queue','tag-warn'])}
   </section>
   <section class="grid g-2">
    <div class="panel"><div class="panel-head"><div><h3>Client performance compare</h3><p>Attributed sends per client this week.</p></div><span class="pill">Compare</span></div>${chart([60,82,70,90,55,76])}</div>
    ${agentsPanel}
   </section>
   <section class="grid g-2">
    <div class="panel"><div class="panel-head"><div><h3>Client accounts</h3><p>Switch between client rooftops and review rollups.</p></div><span class="pill">Switcher</span></div>
     ${[['Meridian Ford','3 rooftops','$1.9M','tag-ok'],['Apex Honda','2 rooftops','$1.2M','tag-live'],['Lakeshore Toyota','4 rooftops','$2.3M','tag-ok'],['Crestview Auto','1 rooftop','$640k','tag-warn']].map(r=>`<div class="row r4"><div><strong>${r[0]}</strong><span class="sub">${r[1]}</span></div><div><span class="lbl">In motion</span><span class="num">${r[2]}</span></div><div><span class="lbl">Health</span><span class="num">Good</span></div><div><span class="tag ${r[3]}">View</span></div></div>`).join('')}
    </div>
    <aside class="panel"><div class="panel-head"><div><h3>Rollup attribution</h3><p>Channel mix across the portfolio.</p></div></div>
     ${[['Direct mail (QR)','48%','tag-ok'],['SMS','31%','tag-live'],['Email','21%','tag-warn']].map(r=>`<div class="row" style="grid-template-columns:1fr auto auto;gap:12px"><strong>${r[0]}</strong><span class="num">${r[1]}</span><span class="tag ${r[2]}">tracked</span></div>`).join('')}
    </aside>
   </section>`,
  dealer:`
   <section class="kpis">
    ${kpi('Lapsed customers in DMS','3,142','Identified & contactable',['Hot','tag-hot'])}
    ${kpi('Revenue in motion','$1.4M','This rooftop, 30 days',['+9%','tag-ok'])}
    ${kpi('Service retention risk','11.6%','Owners needing action',['Act','tag-warn'])}
    ${kpi('Appointments booked','284','QR + call attributed',['+22%','tag-ok'])}
   </section>
   <section class="grid g-2">
    <div class="panel"><div class="panel-head"><div><h3>Signals engine</h3><p>Lifecycle motion across sales, service, trade, and loyalty.</p></div><span class="pill">High intent</span></div>${signalStages}<div style="margin-top:18px">${chart([70,50,86,62,94,60])}</div></div>
    ${agentsPanel}
   </section>
   <section class="grid g-2">
    <div class="panel"><div class="panel-head"><div><h3>Audience studio</h3><p>Activation-ready segments built from your DMS.</p></div><span class="pill">Ready</span></div>
     ${[['Lease maturity · 120 days','Upgrade-probable owners','12,440','tag-ok'],['High-value service drift','Loyal owners gone quiet','4,818','tag-warn'],['Trade equity + SUV intent','Positive equity, SUV behavior','2,291','tag-ok'],['Finance re-entry','Stalled approvals, renewed visits','1,072','tag-hot']].map(r=>`<div class="row r4"><div><strong>${r[0]}</strong><span class="sub">${r[1]}</span></div><div><span class="lbl">Reach</span><span class="num">${r[2]}</span></div><div><span class="lbl">Status</span><span class="num">Active</span></div><div><span class="tag ${r[3]}">Activate</span></div></div>`).join('')}
    </div>
    <aside class="panel"><div class="panel-head"><div><h3>Campaign attribution</h3><p>Per-piece tracking, this cycle.</p></div></div>
     ${[['Sent','18,204','tag-live'],['Delivered','17,902','tag-ok'],['QR scanned','3,118','tag-ok'],['Booked','284','tag-ok']].map(r=>`<div class="row" style="grid-template-columns:1fr auto auto;gap:12px"><strong>${r[0]}</strong><span class="num">${r[1]}</span><span class="tag ${r[2]}">✓</span></div>`).join('')}
    </aside>
   </section>`,
  staff:`
   <section class="kpis">
    ${kpi('Tasks in your queue','38','Ranked by leverage',['Today','tag-warn'])}
    ${kpi('Closed today','7','Appointments booked',['+3','tag-ok'])}
    ${kpi('Calls due','14','Highest priority first',['Now','tag-hot'])}
    ${kpi('Texts queued','11','Pre-written, compliant',['Ready','tag-live'])}
   </section>
   <section class="grid g-2">
